name = "notion_client"
version = "1.0.0"
description = "Typed Notion API client for Gleam (BEAM). Generated request builders + response decoders, retries, pagination, structured logging."
licences = ["Apache-2.0"]
repository = { type = "github", user = "janwirth", repo = "gleam_notion_client" }
links = [
  { title = "Notion API reference", href = "https://developers.notion.com/reference" },
]
target = "erlang"
gleam = ">= 1.15.0"

internal_modules = [
  "notion_client/internal/*",
]

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
oas_generator_utils = ">= 1.1.0 and < 2.0.0"
gleam_http = ">= 4.3.0 and < 5.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
snag = ">= 1.2.0 and < 2.0.0"
gleam_httpc = ">= 5.0.0 and < 6.0.0"
gleam_erlang = ">= 1.3.0 and < 2.0.0"
gleam_yielder = ">= 1.1.0 and < 2.0.0"
argv = ">= 1.0.2 and < 2.0.0"
envoy = ">= 1.2.0 and < 2.0.0"
simplifile = ">= 2.4.0 and < 3.0.0"

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
oas_generator = ">= 2.3.1 and < 3.0.0"
gleam_crypto = ">= 1.5.0 and < 2.0.0"
filepath = ">= 1.1.0 and < 2.0.0"
